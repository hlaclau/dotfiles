# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Sets user-defined palette
# Palettes must be defined _after_ this line
palette = "poimandres"

# Starship modules

## FIRST LINE/ROW: Info & Status
# First param в”Җв”Ң
[username]
format = " [в•ӯв”Җ$user]($style)@"
style_user = "bold accent"
style_root = "bold accent"
show_always = true

# Second param
[hostname]
format = "[$hostname]($style) in "
style = "bold dimmed subtle"
trim_at = "-"
ssh_only = false
disabled = false

# Third param
[directory]
style = "accent"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "repo: "
# The 'read_only' field was commented out in the original,
# so I'm leaving it commented here as well, but this is where
# it would go if you wanted to enable it.
#read_only = " п Ҫ"

# Before all the version info (python, nodejs, php, etc.)
[git_status]
style = "subtle"
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
deleted = "x"

# Last param in the first line/row
[cmd_duration]
min_time = 1
format = "took [$duration]($style)"
disabled = false


## SECOND LINE/ROW: Prompt
# Somethere at the beginning
[battery]
full_symbol = "п•ё "
charging_symbol = "п–ғ "
discharging_symbol = "п–Ӯ "
disabled = true

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 15
style = "bold error"
disabled = true

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 50
style = "bold accent"
disabled = true

[[battery.display]]  # "bold green" style when capacity is between 10% and 30%
threshold = 80
style = "bold mint"
disabled = true

# Prompt: optional param 1
[time]
format = " рҹ•ҷ $time($style)\n"
time_format = "%T"
style = "subtle"
disabled = true

# Prompt: param 2 в””в”Җ
[character]
success_symbol = " [в•°в”ҖО»](accent)"
error_symbol = " [Г—](error)"

# SYMBOLS
[status]
symbol = "рҹ”ҙ"
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
disabled = false

[aws]
symbol = "оҢҪ  "

[conda]
symbol = "п„Ң "

[dart]
symbol = "оһҳ "

[docker_context]
symbol = "пҢҲ "
format = "via [$symbol$context]($style) "
style = "bold mint"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "оүө "

[elm]
symbol = "оҳ¬ "

[git_branch]
symbol = "пҗҳ "
style = "bold accent"

[golang]
symbol = "оҳ§ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[julia]
symbol = "оҳӨ "

[haskell]
symbol = "О» "

[memory_usage]
symbol = "пЎҡ "

[nim]
symbol = "пҡӨ "

[nix_shell]
symbol = "пӢң "

[package]
symbol = "пЈ– "

[perl]
symbol = "оқ© "

[php]
symbol = "оҳҲ "

[python]
symbol = "оҳҶ "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold accent"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "оҲҫ "

[rust]
symbol = "оһЁ "

[scala]
symbol = "оң· "

[shlvl]
symbol = "п„  "

[swift]
symbol = "пҜЈ "

[nodejs]
format = "via [пўҳ Node.js $version](bold mint) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]


# Palette definitions
[palettes.poimandres]
accent = "#5de4c7"
mint = "#add7ff"
error = "#d0679d"
subtle = "#a6accd"
text = "#a6accd"
dim = "#28344a"
comment = "#787c99"