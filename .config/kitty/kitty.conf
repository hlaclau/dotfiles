font_family JetBrains Mono Nerd Font
font_size 14
# vim:ft=kitty

# The basic colors
foreground              #fafafa
background              #18181b
selection_foreground    none
selection_background    #3f3f46

# Cursor colors
cursor                  #fafafa
cursor_text_color       #18181b

# URL underline color when hovering with mouse
url_color               #fafafa

# Kitty window border colors
active_border_color     #fafafa
inactive_border_color   #3f3f46
bell_border_color       #e4e4e7

# OS Window titlebar colors
wayland_titlebar_color system

# Tab bar colors
active_tab_foreground   #18181b
active_tab_background   #fafafa
inactive_tab_foreground #a1a1aa
inactive_tab_background #27272a
tab_bar_background      #18181b

# The 16 terminal colors

# black
color0  #18181b
color8  #3f3f46

# red
color1  #71717a
color9  #a1a1aa

# green
color2  #a1a1aa
color10 #d4d4d8

# yellow
color3  #e4e4e7
color11 #f4f4f5

# blue
color4  #fafafa
color12 #e4e4e7

# magenta
color5  #71717a
color13 #a1a1aa

# cyan
color6  #a1a1aa
color14 #d4d4d8

# white
color7  #e4e4e7
color15 #fafafa


# --------------------------------------------------
# -- APPEARANCE & UI -------------------------------
# --------------------------------------------------
# Make the background slightly transparent (optional)
# Cursor customization
cursor_shape     block
cursor_blink_interval 0.5
window_margin_width 5
# hide_window_decorations yes

# --------------------------------------------------
# -- FUNCTIONALITY ---------------------------------
# --------------------------------------------------
# Set default shell
shell /bin/zsh

# Initial window size (in columns and rows)
initial_window_width  120c
initial_window_height 30c

# Increase the scrollback buffer to 10,000 lines
scrollback_lines 10000

# Allow remote control for nnn image previews etc.
allow_remote_control yes

# Manually set the socket path (from our debugging session)
listen_on unix:/tmp/kitty


# --------------------------------------------------
# -- KEYMAPS ---------------------------------------
# --------------------------------------------------
# Open URLs with Ctrl+Shift+U
map ctrl+shift+u open_url_with_default_browser

# Clear the terminal screen with Ctrl+Shift+K
map ctrl+shift+k clear_terminal scrollback active/

tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
