font_family JetBrainsMono Nerd Font
font_size 14
adjust_line_height 175%
window_padding_width 10
hide_window_decorations titlebar-only

foreground #a6accd
background #1b1e28

# Black
color0 #1b1e28
color8 #a6accd

# Red
color1 #d0679d
color9 #d0679d

# Green
color2  #5de4c7
color10 #5de4c7

# Yellow
color3  #fffac2
color11 #fffac2

# Blue
color4  #89ddff
color12 #add7ff

# Magenta
color5  #fcc5e9
color13 #fae4fc

# Cyan
color6  #add7ff
color14 #89ddff

# White
color7  #ffffff
color15 #ffffff

# Cursor
cursor #ffffff
cursor_text_color #1b1e28

# Selection highlight
selection_foreground none
selection_background #28344a

url_color #5de4c7

# Window borders
active_border_color #3d59a1
inactive_border_color #101014
bell_border_color #fffac2

# Tab bar
tab_bar_style fade
tab_fade 1
active_tab_foreground   #3d59a1
active_tab_background   #16161e
active_tab_font_style   bold
inactive_tab_foreground #787c99
inactive_tab_background #16161e
inactive_tab_font_style bold
tab_bar_background #101014

# Title bar
macos_titlebar_color #16161e


# --------------------------------------------------
# -- APPEARANCE & UI -------------------------------
# --------------------------------------------------
cursor_shape     block
cursor_blink_interval 0.5
cursor_trail 3
cursor_trail_decay 0.1 0.4

# --------------------------------------------------
# -- FUNCTIONALITY ---------------------------------
# --------------------------------------------------
# Set default shell
shell /bin/zsh

# Initial window size (in columns and rows)
initial_window_width  120c
initial_window_height 30c

# Increase the scrollback buffer to 10,000 lines
scrollback_lines 10000

# Allow remote control for nnn image previews etc.
allow_remote_control yes

# Manually set the socket path (from our debugging session)
listen_on unix:/tmp/kitty


# --------------------------------------------------
# -- KEYMAPS ---------------------------------------
# --------------------------------------------------
# Open URLs with Ctrl+Shift+U
map ctrl+shift+u open_url_with_default_browser

# Clear the terminal screen with Ctrl+Shift+K
map ctrl+shift+k clear_terminal scrollback active/

tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
